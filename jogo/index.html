<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">
    <title>Jogo 2D - Coletor de Moedas</title>

  </head>

  <body>
    <h1>🎮 Coletor de Moedas</h1>

    <!-- Caixa do cronometro -->
    <!-- Tive um pouco de dificudade pois nao estava funcionando do jeito que eu queria no começo-->
    <div id="caixaCronometro">
      <img src="Imagens/cronometro.png" alt="Cronômetro" id="imgCronometro">
      <div class="infoBox">
        <span id="tempo">45</span>
      </div>
    </div>
    
    <!-- Caixa para os pontos -->
    <div id="caixaPontos">
      <img src="Imagens/moeda.png" alt="Pontos" id="imgPontos">
      <div class="infoBox">
        <span id="pontuacao">0</span>
      </div>
    </div>
    
    <!-- Caixa para as vidas -->
    <div id="caixaVida">
      <img src="Imagens/coracao2.png" alt="Vida" id="imgVida">
      <div class="infoBox">
        <span id="valorVida">5</span>
      </div>
    </div>

    <div id="areaJogo">
      <div id="jogador"><img src="Imagens/imã.png" alt="jogador"></div>
      <div class="moeda" id="moeda"><img src="Imagens/moeda.png" alt="moeda"></div>
      <div id="mensagemColisao"></div>
      <div id="mensagemCentral"></div>

      <div id="painelTempo">
      <span id="tempo"></span>
      </div>

<audio id="somMoeda" src="sons/moeda.mp3"></audio>
<audio id="somDano" src="sons/dano.mp3"></audio>

      <!-- Obstáculos -->
      <div class="obstaculo" id="obstaculo1"><img src="Imagens/espinho.jpg" alt="espinho"></div>
      <div class="obstaculo" id="obstaculo2"><img src="Imagens/espinho.jpg" alt="espinho"></div>
      <div class="obstaculo" id="obstaculo3"><img src="Imagens/espinho.jpg" alt="espinho"></div>
      <div class="obstaculo" id="obstaculo4"><img src="Imagens/espinho.jpg" alt="barreira"></div>
      <div class="obstaculo" id="obstaculo5"><img src="Imagens/espinho.jpg" alt="barreira"></div>
      <!-- Aparecer a mensagem de vitoria e derrota na tela -->
      <div id="mensagemCentral"></div>
    </div>

    <!-- Audio -->
    <!-- Tive dificuldade com essa parte de som, nunca usei, e nao consegui fazer funcionar -->
    <audio id="somMoeda" src="sons/Moeda 2.mp3"></audio>
    <audio id="somDano" src="sons/Dor 3.mp3"></audio>

    <script src="script.js"></script>
  </body>
</html>
