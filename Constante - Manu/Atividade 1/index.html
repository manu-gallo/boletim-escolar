<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Média</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding: 30px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background-color: #45a049;
    }

    .resultado {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Calcular Média</h2>

    <input type="text" id="nome" placeholder="Nome do aluno">
    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <input type="number" id="nota3" placeholder="Nota 3">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
  </div>

  <script>
    function calcular() {
      let nome = document.getElementById("nome").value;
      let nota1 = Number(document.getElementById("nota1").value);
      let nota2 = Number(document.getElementById("nota2").value);
      let nota3 = Number(document.getElementById("nota3").value);

      let media = (nota1 + nota2 + nota3) / 3;
      let classificacao;

      if (media >= 9) {
        classificacao = "Excelente";
      } else if (media >= 7) {
        classificacao = "Bom";
      } else if (media >= 6) {
        classificacao = "Aprovado";
      } else {
        classificacao = "Reprovado";
      }

      document.getElementById("resultado").innerHTML =
        `Aluno: ${nome} <br>
         Média: ${media.toFixed(2)} <br>
         Classificação: ${classificacao}`;
    }
  </script>

</body>
</html>
