<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema de Velocidade de Jogo</title>

<style>
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
color: white;
text-align: center;
padding: 50px;
}

.container {
background: rgba(0, 0, 0, 0.5);
padding: 30px;
border-radius: 15px;
display: inline-block;
}
h2 {
margin-bottom: 20px;
}
p {
font-size: 18px;
margin: 10px 0;
}

button {
padding: 10px 20px;
font-size: 16px;
border: none;
border-radius: 8px;
cursor: pointer;
background-color: #00c853;
color: white;
transition: 0.3s;
}

button:hover {
background-color: #00a844;
transform: scale(1.05);
}
</style>
</head>

<body>
<div class="container">
<h2>🎮 Sistema de Velocidade de Jogo</h2>

<p id="nome"></p>
<p id="velocidade"></p>
<p id="posicao">Posição: 0</p>

<button onclick="mover()">Mover personagem</button>
</div>

<script src="atividade2.js"></script>
</body>
</html>
