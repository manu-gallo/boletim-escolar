<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Compra</title>

<style>
body {
font-family: Arial;
text-align: center;
margin-top: 40px;
}

input, button {
display: block;
margin: 10px auto;
padding: 8px;
width: 250px;
}

button {
background-color: green;
color: white;
border: none;
cursor: pointer;
}

button:hover {

}

#resultado {

font-weight: bold;
}

</style>
</head>
<body>

<h2>Sistema de Compra</h2>

<input type="text" id="cliente" placeholder="Nome do cliente">
<input type="number" id="quantidade" placeholder="Quantidade de produtos">
<button onclick="calcularCompra()">Finalizar Compra</button>
<div id="resultado"></div>

<script src="script.js"></script>

</body>
</html>
